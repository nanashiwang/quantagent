llm:
  provider: "openai"  # openai/anthropic/custom
  api_base: "${LLM_API_BASE:-https://api.openai.com/v1}"
  api_key: "${LLM_API_KEY}"
  model: "${LLM_MODEL:-gpt-4}"
  temperature: 0.7
  max_tokens: 2000

tushare:
  token: "${TUSHARE_TOKEN}"
  api_url: "${TUSHARE_API_URL:-}"

database:
  mongodb:
    uri: "${MONGODB_URI:-mongodb://localhost:27017}"
    db_name: "${MONGODB_DB_NAME:-quant_trading}"
  sqlite:
    path: "${SQLITE_PATH:-data/sqlite/trading.db}"

logging:
  level: "${LOG_LEVEL:-INFO}"
  file: "${LOG_FILE:-logs/app.log}"
